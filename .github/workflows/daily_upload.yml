name: Telegram → YouTube Daily Uploader

on:
  schedule:
    # Runs at 04:00 UTC daily = 9:00 AM PKT (Pakistan Standard Time = UTC+5)
    # Change the time here: https://crontab.guru
    - cron: '0 16 * * *'

  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30       # Kill job if it runs over 30 minutes

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}   # Needed to push updated uploaded_ids.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install telethon googletrans==4.0.0rc1 google-api-python-client google-auth-oauthlib

      - name: Run uploader
        env:
          TELEGRAM_API_ID:      ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH:    ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION:     ${{ secrets.TELEGRAM_SESSION }}
          YOUTUBE_CLIENT_ID:    ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python uploader.py

      - name: Save state files back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uploaded_ids.txt archive_state.json
          git diff --staged --quiet || git commit -m "Update state [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
